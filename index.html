.footer{padding:22px 18px;text-align:center;background:#2f254d;color:#fff}

const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const quiz = document.getElementById("quiz");

function renderQuiz(){
  quiz.innerHTML = "";
  questions.forEach((q, index) => {
    const article = document.createElement("article");
    article.className = "question";
    article.dataset.answer = q.answer.join(",");
    article.innerHTML = `
      <div class="q-head">
        <div class="num">${index + 1}</div>
        <div class="q-text">${q.q} <span class="hint">${q.type === "multi" ? "бірнеше жауап" : "бір жауап"}</span></div>
      </div>
      <div class="options">
        ${q.options.map((opt, i) => `
          <label class="option">
            <input type="${q.type === "multi" ? "checkbox" : "radio"}" name="q${index}" value="${i}">
            <span><b>${letters[i]})</b> ${opt}</span>
          </label>
        `).join("")}
      </div>
      <div class="review">
        <p><b>Правильный ответ:</b> ${q.answer.map(i => letters[i]).join(", ")} — ${q.answer.map(i => q.options[i]).join("; ")}</p>
      </div>
    `;
    quiz.appendChild(article);
  });
}

function checkTest(){
  let score = 0;
  const all = Array.from(document.querySelectorAll(".question"));

  all.forEach((card, idx) => {
    const correct = questions[idx].answer.map(String).sort();
    const selected = Array.from(card.querySelectorAll("input:checked")).map(i => i.value).sort();

    const ok = correct.length === selected.length && correct.every((v,i)=>v===selected[i]);
    if(ok) score++;

    card.classList.add("checked");
    card.querySelectorAll(".option").forEach(label => {
      label.classList.remove("correct","wrong");
      const input = label.querySelector("input");
      if(correct.includes(input.value)) label.classList.add("correct");
      if(input.checked && !correct.includes(input.value)) label.classList.add("wrong");
    });
  });

  document.getElementById("result").textContent = `Результат: ${score} из ${questions.length}`;
  window.scrollTo({top:0, behavior:"smooth"});
}

function resetTest(){
  document.querySelectorAll("input").forEach(i => i.checked = false);
  document.querySelectorAll(".question").forEach(q => q.classList.remove("checked"));
  document.querySelectorAll(".option").forEach(o => o.classList.remove("correct","wrong"));
  document.getElementById("result").textContent = "Результат: —";
  window.scrollTo({top:0, behavior:"smooth"});
}

renderQuiz();
</script>
</body>
